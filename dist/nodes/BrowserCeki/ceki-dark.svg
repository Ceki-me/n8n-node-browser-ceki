<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="4" fill="#e8e8f0"/>

  <g transform="translate(1, 1)">
    <!-- C-ring - main letterform -->
    <path d="M20 4C13.4 4 8 9 8 16s5.4 12 12 12"
          fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Orbital ring crossing the C (Saturn ring style) -->
    <ellipse cx="17" cy="16" rx="16" ry="4"
             fill="none" stroke="#1a1a2e" stroke-width="1.2"
             transform="rotate(-12, 17, 16)"/>

    <!-- Yellow celestial dot -->
    <circle cx="25" cy="10" r="2" fill="#eab308"/>

    <!-- Yellow beam from dot -->
    <path d="M25 12v10" stroke="#eab308" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
